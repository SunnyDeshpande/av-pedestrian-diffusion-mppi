adapt_safety_controller:
  ros__parameters:
    # Vehicle configuration - E2
    vehicle_name: "e2"

    # Control loop parameters
    rate_hz: 20

    # Speed control parameters
    desired_speed: 2.0              # CRUISE mode speed in m/s
    max_acceleration: 0.5           # E2 specific - lower acceleration

    # Safety speed parameters
    speeds:
      slow_speed: 1.5               # E2 - more conservative
      creep_speed: 0.8              # E2 - slower creep speed

    # Braking parameters
    braking:
      hard_brake_effort: 0.6        # Emergency brake
      holding_effort: 0.3           # Holding brake

    # PID controller parameters
    pid:
      kp: 0.6
      ki: 0.0
      kd: 0.1
      wg: 10.0

    # Butterworth filter parameters
    filter:
      cutoff: 1.2
      fs: 30.0
      order: 4
