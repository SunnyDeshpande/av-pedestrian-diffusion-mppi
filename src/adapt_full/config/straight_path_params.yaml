adapt_safety_controller:
  ros__parameters:
    # Vehicle configuration
    vehicle_name: ""                # Vehicle identifier (e.g., "e2", "e4")

    # Control loop parameters
    rate_hz: 20                     # Control loop frequency (Hz)

    # Speed control parameters
    desired_speed: 5.0              # CRUISE mode speed in m/s (max: 5.0 m/s)
    max_acceleration: 1.0           # Maximum acceleration in m/s² (max: 2.0 m/s²)

    # Safety speed parameters (for different states)
    speeds:
      slow_speed: 2.5               # SLOW_CAUTION mode speed (m/s)
      creep_speed: 1.0              # CREEP_PASS mode speed (m/s)

    # Braking parameters
    braking:
      hard_brake_effort: 0.1       # STOP_YIELD emergency brake (0.0-1.0)
      holding_effort: 0.0           # Holding brake to prevent roll (0.0-1.0)

    # PID controller parameters for speed control
    pid:
      kp: 0.6                       # Proportional gain
      ki: 0.0                       # Integral gain
      kd: 0.1                       # Derivative gain
      wg: 10.0                      # Integral windup guard

    # Butterworth filter parameters for speed smoothing
    filter:
      cutoff: 1.2                   # Cutoff frequency (Hz)
      fs: 30.0                      # Sampling frequency (Hz)
      order: 4                      # Filter order
